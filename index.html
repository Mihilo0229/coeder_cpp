<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>C++ 実行（Judge0 API）</title>
<style>
textarea { width: 100%; height: 220px; }
pre { background: #f4f4f4; padding: 10px; white-space: pre-wrap; }
button { padding: 6px 16px; }
</style>
</head>
<body>

<h2>C++ 実行（サーバ無し公開用 / Judge0 API）</h2>

<textarea id="code">
#include <bits/stdc++.h>
using namespace std;

int main() {
    ios::sync_with_stdio(false);
    cin.tie(nullptr);

    int n;
    if (!(cin >> n)) return 0;
    cout << n * 2 << "\n";
}
</textarea>

<p>標準入力：</p>
<textarea id="stdin" style="height:80px;">21</textarea>

<br><br>
<button onclick="run()">実行</button>

<h3>実行結果</h3>
<pre id="output">まだ実行していません。</pre>

<script>
const API_BASE = "https://judge0-ce.p.rapidapi.com"; // 無料枠ありのエンドポイント例
const RAPIDAPI_KEY = "YOUR_RAPIDAPI_KEY_HERE";        // 自分のキーを入れる

async function run() {
  const code = document.getElementById("code").value;
  const stdin = document.getElementById("stdin").value;
  const outEl = document.getElementById("output");
  outEl.textContent = "実行中...";

  try {
    // ジョブ作成
    const createRes = await fetch(API_BASE + "/submissions?base64_encoded=false&wait=false", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-RapidAPI-Key": RAPIDAPI_KEY,
        "X-RapidAPI-Host": "judge0-ce.p.rapidapi.com"
      },
      body: JSON.stringify({
        language_id: 54, // C++ (GCC 9.2.0)
        source_code: code,
        stdin: stdin
      })
    });

    const createData = await createRes.json();
    const token = createData.token;
    if (!token) {
      outEl.textContent = "ジョブ作成に失敗しました。";
      return;
    }

    // 結果ポーリング
    let result;
    for (;;) {
      const res = await fetch(API_BASE + "/submissions/" + token + "?base64_encoded=false", {
        headers: {
          "X-RapidAPI-Key": RAPIDAPI_KEY,
          "X-RapidAPI-Host": "judge0-ce.p.rapidapi.com"
        }
      });
      result = await res.json();
      if (result.status && result.status.id >= 3) break; // 1,2: 実行中
      await new Promise(r => setTimeout(r, 700));
    }

    let text = "";
    if (result.stdout) text += "stdout:\n" + result.stdout + "\n";
    if (result.stderr) text += "stderr:\n" + result.stderr + "\n";
    if (result.compile_output) text += "compile:\n" + result.compile_output + "\n";
    if (!text) text = "出力なし（終了コード " + (result.status ? result.status.id : "?") + "）";
    outEl.textContent = text;
  } catch (e) {
    outEl.textContent = "エラー: " + e;
  }
}
</script>

</body>
</html>
